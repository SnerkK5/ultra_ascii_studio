name: Build Installers Matrix

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Attach built artifacts to a GitHub Release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish (example: v1.2.0). Required when publish_release=true in manual run."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    continue-on-error: ${{ matrix.arch == 'x86' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            py: "3.12"
            py_arch: x64
          - arch: x86
            py: "3.11"
            py_arch: x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          architecture: ${{ matrix.py_arch }}
      - name: Install build deps
        if: ${{ matrix.arch == 'x64' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pillow numpy opencv-python imageio imageio-ffmpeg PySide6 psutil
      - name: Build Windows artifacts
        if: ${{ matrix.arch == 'x64' }}
        shell: pwsh
        run: ./packaging/build_windows.ps1 -Arch ${{ matrix.arch }}
      - name: x86 placeholder
        if: ${{ matrix.arch == 'x86' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_bundle/installers/windows/x86 | Out-Null
          @"
          x86 build is not produced automatically.
          Reason: PySide6 has no supported win32 wheels for current toolchain.
          Use x64 installer.
          "@ | Set-Content release_bundle/installers/windows/x86/README.txt -Encoding UTF8
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-windows-${{ matrix.arch }}
          path: release_bundle/installers/windows/${{ matrix.arch }}/*

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyinstaller pillow numpy opencv-python imageio imageio-ffmpeg PySide6 psutil
      - name: Build Linux artifacts
        run: |
          chmod +x ./packaging/build_linux.sh
          ./packaging/build_linux.sh x64
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-linux-x64
          path: release_bundle/installers/linux/x64/*

  macos:
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
          - os: macos-15
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyinstaller pillow numpy opencv-python imageio imageio-ffmpeg PySide6 psutil
      - name: Build macOS artifacts
        run: |
          chmod +x ./packaging/build_macos.sh
          ./packaging/build_macos.sh ${{ matrix.arch }}
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-macos-${{ matrix.arch }}
          path: release_bundle/installers/macos/${{ matrix.arch }}/*

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - name: Build Android APKs
        run: |
          cd android_app
          chmod +x ./gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew --no-daemon assembleDebug assembleRelease
          mkdir -p ../release_bundle/installers/android/universal
          cp app/build/outputs/apk/debug/app-debug.apk ../release_bundle/installers/android/universal/ASCIIStudio_Android_universal_debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk ../release_bundle/installers/android/universal/ASCIIStudio_Android_universal_release_unsigned.apk
          cd ../release_bundle/installers/android/universal
          sha256sum ASCIIStudio_Android_universal_debug.apk ASCIIStudio_Android_universal_release_unsigned.apk > SHA256SUMS.txt
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-android-universal
          path: release_bundle/installers/android/universal/*

  release:
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux
      - macos
      - android
    if: >-
      always() &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release)
      ) &&
      needs.windows.result == 'success' &&
      needs.linux.result == 'success' &&
      needs.android.result == 'success'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          path: release_assets
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "release_tag is required for manual publish" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
      - name: Build release payload
        shell: bash
        run: |
          mkdir -p release_payload

          copy_if_exists () {
            local src="$1"
            if [[ -n "$src" && -f "$src" ]]; then
              cp "$src" release_payload/
            fi
          }

          copy_if_exists "$(find release_assets -type f -name 'ASCIIStudio_Setup_windows_x64.exe' | head -n1)"
          copy_if_exists "$(find release_assets -type f -name 'ASCIIStudio_WebBootstrap_windows_x64.exe' | head -n1)"
          copy_if_exists "$(find release_assets -type f -name 'ASCIIStudio_windows_x64_portable.zip' | head -n1)"

          copy_if_exists "$(find release_assets -type f -name 'ASCIIStudio_linux_x64_portable.tar.gz' | head -n1)"
          copy_if_exists "$(find release_assets -type f -name 'ASCIIStudio_macos_x64_portable.zip' | head -n1)"
          copy_if_exists "$(find release_assets -type f -name 'ASCIIStudio_macos_arm64_portable.zip' | head -n1)"

          copy_if_exists "$(find release_assets -type f -name 'ASCIIStudio_Android_universal_debug.apk' | head -n1)"
          copy_if_exists "$(find release_assets -type f -name 'ASCIIStudio_Android_universal_release_unsigned.apk' | head -n1)"

          if [[ ! -f release_payload/ASCIIStudio_Setup_windows_x64.exe ]]; then
            echo "Required windows release asset missing: ASCIIStudio_Setup_windows_x64.exe" >&2
            exit 1
          fi

          shopt -s nullglob
          files=(release_payload/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No files to publish" >&2
            exit 1
          fi
          (
            cd release_payload
            sha256sum * > SHA256SUMS.txt
          )

          ls -la release_payload
      - name: Create or update release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            release_payload/*
          overwrite_files: true
          make_latest: true
          generate_release_notes: true
